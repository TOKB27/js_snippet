<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>申請一覧</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- App CSS -->
  <link href="./assets/css/app.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <h1 class="h4 mb-0">申請一覧</h1>
      <button id="btnNew" class="btn btn-primary">新規申請</button>
    </div>

    <!-- 一覧 -->
    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle" id="recordsTable">
            <thead class="table-light">
              <tr>
                <th>申請ID</th>
                <th>申請種別</th>
                <th>対象ID</th>
                <th>状態</th>
                <th>申請日時</th>
                <th class="text-end">操作</th>
              </tr>
            </thead>
            <tbody>
              <!-- app.js で test_data.json から描画 -->
            </tbody>
          </table>
        </div>
        <div class="text-muted small">
          ※ 一覧は <code>test_data.json</code> から読み込みます
        </div>
      </div>
    </div>

  </div>

  <!-- 申請モーダル -->
  <div class="modal fade" id="applyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">

        <!-- ヘッダー（色はJSで切替） -->
        <div class="modal-header text-white" id="applyModalHeader">
          <h5 class="modal-title" id="applyModalTitle">新規申請</h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="閉じる"
          ></button>
        </div>

        <div class="modal-body">
          <!-- Step 1: 入力 -->
          <div id="stepForm">
            <div id="formContainer"></div>
          </div>

          <!-- Step 2: 確認 -->
          <div id="stepConfirm" class="d-none">
            <div class="mb-3">
              <div class="fw-semibold mb-2">申請内容（確認）</div>
              <div id="confirmSummary" class="border rounded p-3 bg-white"></div>
            </div>

            <div class="mb-2 group-bar">申請前確認</div>
            <div id="precheckContainer" class="mb-3"></div>
          </div>
        </div>

        <div class="modal-footer">
          <div class="me-auto text-danger small d-none" id="formError">
            入力に不備があります。
          </div>

          <button type="button" class="btn btn-outline-secondary d-none" id="btnBack">
            戻る
          </button>
          <button type="button" class="btn btn-primary" id="btnNext">
            次へ
          </button>
          <button type="button" class="btn btn-success d-none" id="btnSubmit">
            申請
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- 詳細モーダル（申請詳細） -->
  <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">

        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title" id="detailModalTitle">申請詳細</h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="閉じる"
          ></button>
        </div>

        <div class="modal-body">
          <!-- 申請内容 -->
          <div id="detailSummary" class="border rounded p-3 bg-white mb-3"></div>

          <!-- 申請前確認 -->
          <div id="detailPrecheck" class="border rounded p-3 bg-white"></div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btnCloseDetail">
            閉じる
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- jQuery / Bootstrap JS（順序重要） -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App JS（順序重要） -->
  <script src="./assets/js/modules/formConfig.js"></script>
  <script src="./assets/js/modules/validators.js"></script>
  <script src="./assets/js/modules/api.js"></script>
  <script src="./assets/js/modules/modalWizard.js"></script>
  <script src="./assets/js/modules/detailView.js"></script>
  <script src="./assets/js/modules/tableActions.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
